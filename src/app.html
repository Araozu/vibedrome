<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<script>
			(function () {
				var VALID = [
					'corporate-memo',
					'wishful-aurosa',
					'misty-dream',
					'twilight-echoes',
					'crimson-shade',
					'spectral-mist',
					'golden-plume',
					'forest-ripple',
					'blazing-fields',
					'enchanted-encounter'
				];
				var stored = localStorage.getItem('vibedrome:color-theme');
				document.documentElement.setAttribute(
					'data-color-theme',
					stored && VALID.indexOf(stored) !== -1 ? stored : 'corporate-memo'
				);
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
